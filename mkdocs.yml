# =============================================================================
# MKDOCS CONFIGURATION - Django Observability Documentation
# =============================================================================
# This file configures MkDocs Material for generating the documentation site.
# It defines the site metadata, theme, plugins, extensions, and navigation.
#
# Documentation is built with MkDocs Material theme and deployed to GitHub Pages.
# =============================================================================

# =============================================================================
# SITE METADATA
# =============================================================================
# Basic information about the documentation site
# - site_name: Title shown in browser tab and header
# - site_description: Meta description for SEO
# - site_author: Author name for meta tags
# - site_url: Production URL for GitHub Pages
# =============================================================================
site_name: Django Observability Stack
site_description: A complete tutorial & guide for building observability in Django applications with Prometheus, Grafana, Loki, and AI integration
site_author: MdAshiqurRahmanZayed
site_url: https://mdashiqurrahmanzayed.github.io/django-observability/

# =============================================================================
# REPOSITORY
# =============================================================================
# GitHub repository information
# - repo_name: Display name for repository link
# - repo_url: GitHub repository URL
# =============================================================================
repo_name: django-observability
repo_url: https://github.com/MdAshiqurRahmanZayed/django-observability

# =============================================================================
# COPYRIGHT
# =============================================================================
# Footer copyright notice
# =============================================================================
copyright: Copyright &copy; 2026 MdAshiqurRahmanZayed

# =============================================================================
# CUSTOM CSS
# =============================================================================
# Custom CSS files to override default styles
# - css/footer.css: Custom footer styling with social links
# =============================================================================
extra_css:
  - css/footer.css

# =============================================================================
# DOCUMENTATION DIRECTORY
# =============================================================================
# Where to find markdown source files
# - docs_dir: Directory containing documentation markdown files
# =============================================================================
docs_dir: docs

# =============================================================================
# DEVELOPMENT SERVER
# =============================================================================
# Local development server settings
# - dev_addr: Address and port for local preview (mkdocs serve)
# Note: Port 8001 is used to avoid conflict with MCP server (port 8000)
# =============================================================================
dev_addr: 127.0.0.1:8001

# =============================================================================
# THEME CONFIGURATION
# =============================================================================
# Material theme settings for appearance and features
# - name: material (Material Design theme)
# - custom_dir: Custom template overrides
# - palette: Light/dark mode configuration
# - features: Navigation and UI features
# =============================================================================
theme:
  name: material                          # Use Material Design theme
  custom_dir: docs/overrides              # Custom templates (footer, etc.)

  # ===========================================================================
  # COLOR PALETTE
  # ===========================================================================
  # Defines colors for light and dark modes
  # - Light mode: Default white background
  # - Dark mode: Slate gray background
  # - Primary/Accent: Deep purple color scheme
  # - Toggle: Switch between light/dark modes
  # ===========================================================================
  palette:
    - media: "(prefers-color-scheme: light)"      # Light mode (system preference)
      scheme: default                              # Default light theme
      primary: deep-purple                         # Primary color (purple)
      accent: deep-purple                          # Accent color (purple)
      toggle:
        icon: material/brightness-7                # Sun icon
        name: Switch to dark mode                  # Tooltip

    - media: "(prefers-color-scheme: dark)"        # Dark mode (system preference)
      scheme: slate                                # Slate dark theme
      primary: deep-purple                         # Primary color (purple)
      accent: deep-purple                          # Accent color (purple)
      toggle:
        icon: material/brightness-4                # Moon icon
        name: Switch to light mode                 # Tooltip

  # ===========================================================================
  # FEATURES
  # ===========================================================================
  # UI features for navigation and content
  # - navigation.instant: Load pages without full page reload
  # - navigation.tabs: Top-level sections as tabs
  # - navigation.sections: Expandable sections in sidebar
  # - navigation.expand: Expand all sections by default
  # - navigation.top: Back to top button
  # - search.suggest: Search suggestions as you type
  # - search.highlight: Highlight search terms in results
  # - content.code.copy: Copy button on code blocks
  # - content.code.annotate: Add annotations to code
  # - content.tabs.link: Link between tab content
  # ===========================================================================
  features:
    - navigation.instant                  # Fast page loading
    - navigation.tabs                     # Tab navigation
    - navigation.sections                 # Collapsible sections
    - navigation.expand                   # Expand by default
    - navigation.top                      # Back to top button
    - search.suggest                      # Search suggestions
    - search.highlight                    # Highlight search matches
    - content.code.copy                   # Code copy button
    - content.code.annotate               # Code annotations
    - content.tabs.link                   # Linked tabs

  # ===========================================================================
  # ICONS
  # ===========================================================================
  # Icons for navigation and links
  # - repo: GitHub icon for repository link
  # ===========================================================================
  icon:
    repo: fontawesome/brands/github       # GitHub icon

# =============================================================================
# PLUGINS
# =============================================================================
# MkDocs plugins for additional functionality
# - search: Full-text search with separator configuration
# - git-revision-date-localized: Show last modified date for pages
# =============================================================================
plugins:
  - search:
      separator: '[\s\-\.]+'              # Split on spaces, hyphens, dots
  - git-revision-date-localized:
      enable_creation_date: true          # Show creation date
      enable_git_follow: false            # Don't follow git renames

# =============================================================================
# MARKDOWN EXTENSIONS
# =============================================================================
# Additional Markdown features for rich content
# - admonition: Note/tip/warning boxes
# - pymdownx.details: Collapsible details sections
# - pymdownx.superfences: Fenced code blocks with syntax highlighting
# - pymdownx.highlight: Code syntax highlighting with line numbers
# - pymdownx.inlinehilite: Inline code highlighting
# - pymdownx.tabbed: Tabbed content blocks
# - pymdownx.emoji: Emoji support (Twitter emoji)
# - tables: Table support
# - footnotes: Footnote support
# - attr_list: HTML attributes on elements
# - md_in_html: Markdown inside HTML
# - def_list: Definition lists
# - pymdownx.tasklist: Task checkboxes
# - pymdownx.snippets: Include files
# =============================================================================
markdown_extensions:
  - admonition                          # !!! note/tip/warning boxes
  - pymdownx.details                    # <details> collapsible sections
  - pymdownx.superfences                # ```code blocks with syntax
  - pymdownx.highlight:                 # Syntax highlighting
      anchor_linenums: true             # Show line numbers
  - pymdownx.inlinehilite               # `inline code` highlighting
  - pymdownx.tabbed:                    # Tabbed content
      alternate_style: true             # Use tabbed style
  - pymdownx.emoji:                     # Emoji support
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables                              # | Table | Support |
  - footnotes                           # [^1] Footnotes
  - attr_list                           # {: .class} attributes
  - md_in_html                          # Markdown in HTML blocks
  - def_list                            # Definition lists
  - pymdownx.tasklist:                  # - [ ] Checkboxes
      custom_checkbox: true             # Custom styling
  - pymdownx.snippets                   # --8<-- "file.md"

# =============================================================================
