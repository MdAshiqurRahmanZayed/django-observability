events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream django {
        server obs-django:9000;
    }

    server {
        listen 80;
        server_name localhost;

        # Main site static — served directly from site_static/ on disk.
        # Edits are live instantly, no collectstatic needed.
        location /site-static/ {
            alias /app/site_static/;
        }

        # Admin + collectstatic output — Django admin CSS/JS etc.
        location /static/ {
            alias /app/static/;
        }

        location /media/ {
            alias /app/mediafiles/;
        }

        location / {
            proxy_pass         http://django;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 90s;
        }
    }
}
