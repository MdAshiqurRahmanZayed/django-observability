<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/site-static/css/base.css">
  <link rel="stylesheet" href="/site-static/css/todo/main.css">
  {% block extra_css %}{% endblock %}
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">Todos</div>
  <div class="sidebar-tagline">Stay on track</div>
  <nav class="sidebar-nav">
    <a href="{% url 'todo:todo_list' %}?tab=pending" class="sidebar-link {% block nav_list %}{% endblock %}">
      <i class="bi bi-list-check"></i> My Todos
    </a>
    <a href="{% url 'todo:todo_create' %}" class="sidebar-link {% block nav_create %}{% endblock %}">
      <i class="bi bi-plus-circle"></i> New Todo
    </a>
  </nav>
  <div class="sidebar-footer">Django Todo App</div>
</aside>

<main class="main">
  {% block content %}{% endblock %}
</main>

<script src="/site-static/js/todo/main.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
