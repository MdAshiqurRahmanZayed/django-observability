{% extends 'todo/base.html' %}
{% block nav_list %}active{% endblock %}

{% block content %}

<h1 class="page-title">Delete Todo</h1>
<p class="page-subtitle">This action is permanent and cannot be undone.</p>

<div class="form-card">
  <div class="delete-warning">
    <h4><i class="bi bi-exclamation-triangle"></i> Are you sure?</h4>
    <p>You're about to delete <strong>"{{ todo.title }}"</strong>.</p>
  </div>

  <form method="post">
    {% csrf_token %}
    <div class="d-flex gap-10">
      <button type="submit" class="btn-danger">
        <i class="bi bi-trash"></i> Yes, delete it
      </button>
      <a href="{% url 'todo:todo_list' %}" class="btn-secondary">
        <i class="bi bi-arrow-left"></i> Go back
      </a>
    </div>
  </form>
</div>

{% endblock %}
